<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Agent Interface - Real-time Interactive</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="main-container">
      <!-- Conversation Panel -->
      <div class="conversation-panel">
        <div class="panel-header">
          <h1>AI Conversation</h1>
          <div class="connection-status">
            <div class="status-indicator" id="connectionStatus"></div>
            <span id="connectionText">Disconnected</span>
          </div>
        </div>

        <!-- Messages Display -->
        <div class="messages-container" id="messagesContainer">
          <div class="message system">
            <div class="message-content">
              Welcome! Connect to start a conversation. You can type, record audio, and capture images all together.
            </div>
          </div>
          <!-- Loading Indicator (hidden by default) -->
          <div class="loading-indicator" id="loadingIndicator" style="display: none;">
            <div class="loading-dots">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <span class="loading-text">Processing...</span>
          </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
          <!-- Connection Controls -->
          <div class="connection-controls">
            <button id="connectBtn" class="connect-btn">Connect</button>
            <button id="resetBtn" class="reset-btn" disabled>
              Reset
            </button>
          </div>

          <!-- Unified Input -->
          <div class="unified-input-container">
            <div class="capture-status" id="captureStatus">Ready</div>
            <input
              type="text"
              id="textInput"
              class="text-input"
              placeholder="Type a message..."
              disabled
            />
            <button id="captureBtn" class="capture-btn" disabled>Start Capture</button>
          </div>
        </div>
      </div>

      <!-- Interaction Panel -->
      <div class="interaction-panel">
        <!-- Camera Section -->
        <div class="camera-section">
          <h2>Camera Feed</h2>
          <div class="video-container">
            <video id="videoPreview" playsinline autoplay></video>
            <div class="recording-indicator" id="recordingIndicator"></div>
          </div>
          <div class="status-text" id="statusText">Ready</div>
        </div>
      </div>
    </div>

    <!-- Media History Modal (collapsible) -->
    <div class="media-history" id="mediaHistory">
      <div class="history-header">
        <h3>Media History</h3>
        <button class="toggle-history" id="toggleHistory">►</button>
      </div>
      <div class="history-content" id="historyContent" style="display: none">
        <div id="imagesGrid"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
