<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Agent Interface - Real-time Interactive</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="main-container">
      <!-- Conversation Panel -->
      <div class="conversation-panel">
        <div class="panel-header">
          <h1>AI Conversation</h1>
          <div class="header-controls">
            <div class="device-selector">
              <button
                id="deviceMenuBtn"
                class="device-menu-btn"
                title="Select input devices"
              >
                ⚙️
              </button>
              <div class="device-menu" id="deviceMenu" style="display: none">
                <div class="device-group">
                  <label for="cameraSelect">Camera:</label>
                  <select id="cameraSelect" class="device-dropdown"></select>
                </div>
                <div class="device-group">
                  <label for="microphoneSelect">Microphone:</label>
                  <select
                    id="microphoneSelect"
                    class="device-dropdown"
                  ></select>
                </div>
              </div>
            </div>
            <div class="connection-status">
              <div class="status-indicator" id="connectionStatus"></div>
              <span id="connectionText">Disconnected</span>
            </div>
          </div>
        </div>

        <!-- Messages Display -->
        <div class="messages-container" id="messagesContainer">
          <div class="message system">
            <div class="message-content">
              Welcome! Connect to start a conversation. You can type, record
              audio, and capture images all together.
            </div>
          </div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
          <!-- Connection Controls -->
          <div class="connection-controls">
            <button id="connectBtn" class="connect-btn">Connect</button>
            <button id="resetBtn" class="reset-btn" disabled>Reset</button>
            <button
              id="testBtn"
              class="test-btn"
              title="Test Ollama connectivity"
            >
              🧪 Test Ollama
            </button>
          </div>

          <!-- Unified Input -->
          <div class="unified-input-container">
            <input
              type="text"
              id="textInput"
              class="text-input"
              placeholder="Type a message or click Send to record audio..."
              disabled
            />
            <label class="vision-toggle">
              <input type="checkbox" id="visionToggle" />
              <span>📸 Vision</span>
            </label>
            <button id="sendBtn" class="send-btn" disabled>Send</button>
          </div>
        </div>

        <!-- Processing Indicator (hidden by default) -->
        <div
          class="processing-indicator"
          id="processingIndicator"
          style="display: none"
        >
          <div class="processing-header">
            <span class="processing-title">🤖 AI is thinking...</span>
            <span class="processing-timer" id="processingTimer">0s</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>
          <div class="processing-stats">
            <span class="tokens-count"
              >Tokens: <span id="tokenCount">0</span></span
            >
          </div>
        </div>
      </div>

      <!-- Interaction Panel -->
      <div class="interaction-panel">
        <!-- Camera Section -->
        <div class="camera-section">
          <h2>Camera Feed</h2>
          <div class="video-container">
            <video id="videoPreview" playsinline autoplay></video>
            <div class="recording-indicator" id="recordingIndicator"></div>
          </div>
          <div class="status-text" id="statusText">Ready</div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
